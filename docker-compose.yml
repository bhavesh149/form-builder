version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: humanity_forms_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: humanity_user
      POSTGRES_PASSWORD: humanity_pass
      POSTGRES_DB: humanity_forms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U humanity_user -d humanity_forms"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
